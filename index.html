      // Disable common inspect shortcuts and right-click menu
      document.addEventListener("contextmenu", (e) => e.preventDefault());

        if (
          (e.ctrlKey &&
            e.shiftKey &&
            ["I", "J", "C"].includes(e.key.toUpperCase())) ||
          (e.ctrlKey && e.key.toUpperCase() === "U") // Ctrl+U = View Source
        ) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      });
    </script>
