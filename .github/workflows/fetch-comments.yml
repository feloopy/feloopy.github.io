name: Fetch Comments

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (default: production)'
        required: false
        default: 'production'

permissions:
  contents: write

jobs:
  fetch-comments:
    runs-on: ubuntu-latest

    env:
      COMMENTS_OUTPUT: ${{ secrets.COMMENTS_OUTPUT }}
      APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
      APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch comments (verbose diagnostics)
        shell: bash
        run: |
          set -euo pipefail
          TMP="$RUNNER_TEMP/comments.json.tmp"
          HDR="$RUNNER_TEMP/headers.tmp"
          rm -f "$TMP" "$HDR"

          if [ -z "${APPS_SCRIPT_URL:-}" ]; then
            echo "ERROR: APPS_SCRIPT_URL secret missing"; exit 2
          fi
          if [ -z "${APPS_SCRIPT_SECRET:-}" ]; then
            echo "ERROR: APPS_SCRIPT_SECRET secret missing"; exit 3
          fi
          if [ -z "${COMMENTS_OUTPUT:-}" ]; then
            echo "ERROR: COMMENTS_OUTPUT secret missing"; exit 4
          fi

          FULL_URL="${APPS_SCRIPT_URL}?secret=${APPS_SCRIPT_SECRET}"
          echo "Requesting: $FULL_URL"

          curl -fsSL -D "$HDR" --max-time 30 --retry 3 --retry-delay 2 "$FULL_URL" -o "$TMP" || {
            echo "curl returned non-2xx; headers:"; sed -n '1,200p' "$HDR" || true; echo "body preview:"; head -c 1024 "$TMP" || true
            exit 5
          }

          echo "=== RESPONSE HEADERS ==="
          sed -n '1,200p' "$HDR" || true
          echo "=== BODY PREVIEW (first 1024 bytes) ==="
          head -c 1024 "$TMP" | sed -n '1,200p' || true

          if head -c 512 "$TMP" | grep -qi '<html\|<!doctype'; then
            echo "ERROR: Response looks like HTML (login/redirect or error). Aborting."
            exit 6
          fi

          if command -v python3 >/dev/null 2>&1; then
            if ! python3 -m json.tool "$TMP" >/dev/null 2>&1; then
              echo "ERROR: fetched body is not valid JSON. Show first lines:"; head -n 50 "$TMP"
              exit 7
            else
              echo "JSON validated OK (python3 json.tool)."
            fi
          else
            echo "python3 not available; skipping JSON validation."
          fi

          echo "Fetched $(wc -c < "$TMP") bytes into $TMP"
          mkdir -p "$(dirname "$COMMENTS_OUTPUT")"
          mv "$TMP" "$COMMENTS_OUTPUT"
          echo "Saved to $COMMENTS_OUTPUT (size: $(wc -c < "$COMMENTS_OUTPUT") bytes)"

      - name: Commit & push (verbose)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT="$COMMENTS_OUTPUT"
          echo "Working branch: ${GITHUB_REF}"
          BRANCH="${GITHUB_REF_NAME:-}"
          if [ -z "$BRANCH" ]; then BRANCH="${GITHUB_REF#refs/heads/}"; fi
          echo "Resolved branch: $BRANCH"

          if [ ! -f "$OUT" ]; then
            echo "No output file at $OUT; nothing to commit"; exit 0
          fi

          if git ls-files --error-unmatch "$OUT" >/dev/null 2>&1; then
            sha256sum "$OUT" || true
          else
            echo "(file not tracked yet)"
          fi

          git status --porcelain --untracked-files=all
          git add -- "$OUT"
          git status --porcelain --untracked-files=all
          git --no-pager diff --staged -- "$OUT" || true

          if git diff --quiet --exit-code -- "$OUT"; then
            echo "No staged changes vs HEAD — skipping commit"
            exit 0
          fi

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          set +e
          git commit -m "updated comments."
          COMMIT_RC=$?
          set -e
          if [ $COMMIT_RC -ne 0 ]; then
            echo "git commit returned $COMMIT_RC"
          else
            echo "Commit created. Pushing..."
            git push origin "HEAD:${BRANCH}" || {
              echo "git push failed"
              git remote -v
              git branch -vv
              exit 8
            }
            echo "Push succeeded."
          fi
