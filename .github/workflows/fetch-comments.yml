name: Fetch Comments

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (default: production)'
        required: false
        default: 'production'

permissions:
  contents: write

jobs:
  fetch-comments:
    runs-on: ubuntu-latest

    env:
      COMMENTS_OUTPUT: ${{ secrets.COMMENTS_OUTPUT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate and prepare output directory
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${COMMENTS_OUTPUT:-}" ]; then
            echo "ERROR: COMMENTS_OUTPUT secret is empty. Set it to a path like 'data/comments.json'."
            exit 2
          fi
          mkdir -p "$(dirname "$COMMENTS_OUTPUT")"
          echo "Output path: $COMMENTS_OUTPUT"

      - name: Fetch comments with diagnostics
        shell: bash
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
        run: |
          set -euo pipefail
          TMP="$RUNNER_TEMP/comments.json.tmp"
          HDR="$RUNNER_TEMP/headers.tmp"
          rm -f "$TMP" "$HDR"

          if [ -z "${APPS_SCRIPT_ID:-}" ]; then
            echo "ERROR: APPS_SCRIPT_ID secret missing"; exit 3
          fi
          if [ -z "${APPS_SCRIPT_SECRET:-}" ]; then
            echo "ERROR: APPS_SCRIPT_SECRET secret missing"; exit 4
          fi

          URL="https://script.google.com/macros/s/${APPS_SCRIPT_ID}/exec?secret=${APPS_SCRIPT_SECRET}"
          echo "Fetching from: $URL"
          curl -v -fsSL -D "$HDR" --max-time 30 --retry 3 --retry-delay 2 "$URL" -o "$TMP" || {
            echo "Curl failed, headers below:"
            cat "$HDR" || true
            echo "Body preview:"
            head -n 30 "$TMP" || true
            exit 5
          }

          echo "=== HEADERS ==="
          sed -n '1,200p' "$HDR" || true
          echo "=== BODY PREVIEW (first 1KB) ==="
          head -c 1024 "$TMP" | sed -n '1,200p' || true

          if head -c 256 "$TMP" | grep -qi '<html\|<!doctype'; then
            echo "ERROR: HTML detected (redirect/login). Aborting."
            exit 6
          fi

          if command -v python3 >/dev/null 2>&1; then
            if ! python3 -m json.tool "$TMP" >/dev/null 2>&1; then
              echo "ERROR: Invalid JSON response."
              head -n 50 "$TMP" || true
              exit 7
            fi
          fi

          echo "Fetched $(wc -c < "$TMP") bytes."
          mv "$TMP" "$COMMENTS_OUTPUT"
          echo "Saved to $COMMENTS_OUTPUT"

      - name: Commit and push if changed
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT="$COMMENTS_OUTPUT"

          if [ ! -f "$OUT" ]; then
            echo "No output file found; skipping commit."
            exit 0
          fi

          if git diff --quiet --exit-code -- "$OUT"; then
            echo "No changes detected in $OUT"
            exit 0
          fi

          BRANCH="${GITHUB_REF_NAME:-main}"

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -- "$OUT"

          if git diff --cached --quiet; then
            echo "No staged changes, skipping commit."
            exit 0
          fi

          git commit -m "updated comments."
          git push origin "HEAD:${BRANCH}"
          echo "Push successful."
