name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          set -e
          mkdir -p publish
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='source' \
            --exclude='node_modules' \
            --exclude='README*' \
            --exclude='LICENSE*' \
            --exclude='.gitignore' \
            --exclude='*.yml' \
            --exclude='*.yaml' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='build.bat' \
            --exclude='show.bat' \
            --exclude='.vscode' \
            ./ publish/
          touch publish/.nojekyll

          echo "=== Verifying key files ==="
          for f in index.html 404.html robots.txt sitemap.xml; do
            if [ -f "publish/$f" ]; then
              echo "  OK: $f ($(wc -c < "publish/$f") bytes)"
            else
              echo "  MISSING: $f"
            fi
          done

          echo "=== Checking prerendered HTML files ==="
          for page in about.html docs.html blog.html store.html status.html; do
            if [ -f "publish/$page" ]; then
              SIZE=$(wc -c < "publish/$page")
              if [ "$SIZE" -gt 5000 ]; then
                echo "  OK (prerendered): $page ($SIZE bytes)"
              else
                echo "  WARNING: $page is only $SIZE bytes (may not be prerendered)"
              fi
            else
              echo "  MISSING: $page"
            fi
          done

          echo "Publish dir size: $(du -sh publish | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
