name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          set -e
          mkdir -p publish
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='source' \
            --exclude='node_modules' \
            --exclude='README*' \
            --exclude='LICENSE*' \
            --exclude='.gitignore' \
            --exclude='*.yml' \
            --exclude='*.yaml' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='build.bat' \
            --exclude='show.bat' \
            --exclude='.vscode' \
            ./ publish/
          touch publish/.nojekyll
          echo "Publish dir size: $(du -sh publish | cut -f1)"
          ls publish/ | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
